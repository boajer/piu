name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main
    paths:
      - index.js
      - package.json
      - package-lock.json
      - Dockerfile
      - ecosystem.config.js
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd ~/piu
            git pull origin main
            npm ci --omit=dev
            pm2 restart piu-bot || pm2 start ecosystem.config.js
            pm2 save
