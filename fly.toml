app = "piu-bot"
primary_region = "lhr"

[build]

[env]
  TARGET_LANGUAGE = "English"
  # ALLOWED_CHATS — set via: fly secrets set ALLOWED_CHATS="chat1,chat2"

[http_service]
  internal_port = 3000
  auto_stop_machines = "off"
  auto_start_machines = true

[mounts]
  source = "whatsapp_auth"
  destination = "/app/auth"

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
